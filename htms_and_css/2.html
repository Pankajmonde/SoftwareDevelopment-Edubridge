<!DOCTYPE html>
<html>
<head>
    <title>Inline and Internal CSS Example</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: blue;
        }

        p {
            font-size: 18px;
            color: green;
        }
    </style>

</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: red;">This is Inline CSS</h1>

    <!-- Internal CSS -->
    <h2>This is Internal CSS</h2>

    <p>This paragraph is styled using Internal CSS.</p>

</body>
</html>
