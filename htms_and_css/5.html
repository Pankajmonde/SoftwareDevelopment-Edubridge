<!DOCTYPE html>
<html>
<head>
    <title>Div and Span Example</title>
</head>
<body>

    <div style="border: 2px solid blue; padding: 10px;">
        <h2>Student Details</h2>
        <p>
            Name:
            <span style="color: green;">Pankaj Monde</span>    
        </p>
        <p>
            Course:
            <span style="color: red;">Computer Engineering</span>
        </p>
    </div>

</body>
</html>
