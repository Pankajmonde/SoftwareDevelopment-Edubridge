<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If Else Example</title>
   
</head>
<body>

    <h2>JavaScript If Else Example</h2>

    <script>

        var age = 50;

        if (age < 12) {
            alert("Sorry! This game is for children above 12 years.");
        } else {
            alert("Play the Game");
        }

    </script>

</body>
</html>
