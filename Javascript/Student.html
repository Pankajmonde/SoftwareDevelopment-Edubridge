<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
<style>
.container{
width:400px;
margin:auto;
border:2px solid black;
padding:20px;
}
.error{
color:red;
}
</style>
</head>

<body>

<div class="container">

<h2 id="heading">Student Registration Form</h2>

Name:
<input type="text" id="name"><br><br>

Email:
<input type="email" id="email"><br><br>

Skills:<br>
<input type="checkbox" class="skill" value="Java"> Java
<input type="checkbox" class="skill" value="Python"> Python
<input type="checkbox" class="skill" value="JavaScript"> JavaScript
<br><br>

<button onclick="register()">Register</button>

<h3>Registered Students</h3>
<ul id="studentList"></ul>

<p class="error"></p>

</div>

<script>

function register(){

// 1. getElementById()
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;

// 2. querySelector()
let error=document.querySelector(".error");

// Validation
if(name==="" || email===""){
error.innerHTML="Please fill all fields";
return;
}

error.innerHTML="";

// 3. querySelectorAll()
let skills=document.querySelectorAll(".skill:checked");

let selectedSkills=[];

skills.forEach(skill=>{
selectedSkills.push(skill.value);
});

// 4. getElementById()
let list=document.getElementById("studentList");

let li=document.createElement("li");

li.innerHTML=
name + " | " +
email + " | Skills: " +
selectedSkills.join(", ");

list.appendChild(li);

// Clear form
document.getElementById("name").value="";
document.getElementById("email").value="";

}

// 5. getElementsByTagName()
let inputs=document.getElementsByTagName("input");

console.log("Total Inputs: "+inputs.length);

// 6. getElementsByClassName()
let skillsClass=document.getElementsByClassName("skill");

console.log("Total Skills: "+skillsClass.length);

</script>

</body>
</html>
