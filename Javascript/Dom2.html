<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calci</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <label>Enter Num1</label>

    <input type="number" id="n1" placeholder="Enter value for num1">
    
    <label>Enter Num2</label>

    <input type="number" id="n2" placeholder="Enter value for num2">

<button class="btn btn-outline-primary" onclick="calci()">Calci</button>

<p id="op"></p>
<script>
    function calci(){
  
          let x=Number(document.getElementById("n1").value);

          let y=Number(document.getElementById("n2").value);

          let ans="Add:"+(x+y)+"<br>"+"Sub:"+(x-y)+"<br>"+"Mul:"+(x*y)+"<br>"+"Div:"+(x/y);

          document.getElementById("op").innerHTML=ans;
          op.innerHTML=ans;
          op.style.textAlign="center";
        op.style.border="2px solid red";
        op.style.backgroundColor="aqua";
        op.style.padding="10px";
         op.style.margin="10px";
          op.style.fontSize="20px";



    }
  
</script>
</body>
</html>
