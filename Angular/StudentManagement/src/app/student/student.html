<div class="info">
    <h1>Title is: {{title}}</h1>
    <p>Message is: {{msg}}</p>
  </div>
  
  <div>
    <img [src]="imageUrl" width="200">
  </div>
  
  <div>
    <button (click)="info()">Submit</button>
  </div>
  
  <div class="voting">
    <p *ngIf="age<18">
      You are not eligible for voting
    </p>
  
    <p *ngIf="age>=18">
      You are eligible for voting
    </p>
  </div>
  
  <div>
    <label>Enter Number:</label>
  
    <input
        type="number"
        [(ngModel)]="num1"
        placeholder="Enter value">
  </div>
  
  <div *ngIf="num1%2==0; else odd">
  
    <p style="color:green">
      Number is even
    </p>
  
  </div>
  
  <ng-template #odd>
  
  <p style="color:red">
    Number is odd
  </p>
  
  </ng-template>
  
  <h1>Languages are:</h1>
  
  <ul>
  
  <li *ngFor="let x of languages">
  
  {{x}}
  
  </li>
  
  </ul>
  
  <div>
  
  <input type="text"
  
  [(ngModel)]="uname">
  
  <button
  
  (click)="names.push(uname)">
  
  Add Names
  
  </button>
  
  <ul>
  
  <li *ngFor="let usernames of names">
  
  {{usernames}}
  
  </li>
  
  </ul>
  
  </div>
